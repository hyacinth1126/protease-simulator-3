# 테마를 Light로 고정하지 않음. 사용자가 설정에서 "Use system setting" / "Light" / "Dark" 중 선택 가능.
# 라이트/다크 각각 커스텀 색상만 정의하고, base는 지정하지 않아 시스템 설정을 따르도록 함.
[theme.light]
primaryColor = "#FF6B6B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[theme.dark]
primaryColor = "#FF6B6B"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#262730"
textColor = "#FAFAFA"
font = "sans serif"

[server]
headless = true
port = 8501
# Cloud 배포 시 health check 수신을 위해 모든 인터페이스에서 리스닝 (미설정 시 일부 환경에서 127.0.0.1만 바인딩됨)
address = "0.0.0.0"
enableXsrfProtection = true

[browser]
gatherUsageStats = false
